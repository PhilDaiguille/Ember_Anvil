name: CI

on:
  push:
    branches:
      - master
  pull_request:

# Annule les exécutions précédentes encore en cours sur la même ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (check only)
        run: npm run lint:ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
