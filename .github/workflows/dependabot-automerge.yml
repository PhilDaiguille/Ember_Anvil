name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # --- Mises à jour mineures / patch : on valide puis on auto-merge ---
      - name: Checkout code
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/checkout@v7

      - name: Setup Node.js
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: npm ci

      - name: Lint (check only)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: npm run lint:ci

      - name: Run tests
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: npm run test:run

      - name: Build
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: npm run build

      - name: Enable auto-merge
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Mises à jour majeures : revue manuelle requise ---
      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ Mise à jour **majeure** détectée. Revue manuelle requise avant merge."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
